name: Deploy Java Service (Reusable)

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: 'Service name (e.g., core-service)'
      environment:
        required: true
        type: string
        description: 'Target environment (dev or prod)'
      java-version:
        type: string
        default: '21'
      memory:
        type: string
        default: '512Mi'
      cpu:
        type: string
        default: '1'
      min-instances:
        type: number
        default: 0
      max-instances:
        type: number
        default: 10
      db-user:
        required: true
        type: string
        description: 'Database username (e.g., core_service)'
      db-secret-name:
        required: true
        type: string
        description: 'DB password secret base name without env suffix (e.g., db-core-service-password)'
      additional-env-vars:
        type: string
        default: ''
        description: 'Additional env vars in format: KEY1=value1,KEY2=value2 (use {env} as placeholder for environment suffix)'
      additional-secrets:
        type: string
        default: ''
        description: 'Additional secrets in format: ENV_VAR=secret-name-{env}:version (use {env} as placeholder)'
      run-tests:
        type: boolean
        default: true
      timeout:
        type: string
        default: '300s'
      concurrency-limit:
        type: number
        default: 80

jobs:
  test:
    name: Run Tests
    if: ${{ inputs.run-tests }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'prod' && 'production' || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Run tests
        run: mvn -B clean test
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

  build-and-push:
    name: Build & Push Image
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'prod' && 'production' || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build application
        run: mvn -B clean package -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            GITHUB_ACTOR=${{ github.actor }}
            GITHUB_TOKEN=${{ secrets.PAT_TOKEN }}
          tags: |
            ${{ vars.ARTIFACT_REGISTRY_URL }}/${{ inputs.service-name }}:${{ github.sha }}
            ${{ vars.ARTIFACT_REGISTRY_URL }}/${{ inputs.service-name }}:${{ inputs.environment }}-latest
          cache-from: type=registry,ref=${{ vars.ARTIFACT_REGISTRY_URL }}/${{ inputs.service-name }}:buildcache
          cache-to: type=registry,ref=${{ vars.ARTIFACT_REGISTRY_URL }}/${{ inputs.service-name }}:buildcache,mode=max

  deploy:
    name: Deploy to Cloud Run (${{ inputs.environment }})
    needs: [build-and-push]
    if: always() && needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'prod' && 'production' || 'dev' }}

    steps:
      - name: Set environment suffix
        id: env
        run: |
          if [ "${{ inputs.environment }}" == "prod" ]; then
            echo "env_suffix=prod" >> $GITHUB_OUTPUT
            echo "default_min_instances=1" >> $GITHUB_OUTPUT
          else
            echo "env_suffix=dev" >> $GITHUB_OUTPUT
            echo "default_min_instances=${{ inputs.min-instances }}" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          # Service account: {service-name}-{env}@{project}.iam.gserviceaccount.com
          SERVICE_ACCOUNT="${{ inputs.service-name }}-${{ steps.env.outputs.env_suffix }}@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com"
          
          # DB password secret: {db-secret-name}-{env}:latest
          DB_SECRET="${{ inputs.db-secret-name }}-${{ steps.env.outputs.env_suffix }}:latest"
          
          # Build secrets flag
          SECRETS_FLAG="DB_PASSWORD=${DB_SECRET}"
          if [ -n "${{ inputs.additional-secrets }}" ]; then
            # Replace {env} placeholder with actual environment suffix
            ADDITIONAL_SECRETS=$(echo "${{ inputs.additional-secrets }}" | sed "s/{env}/${{ steps.env.outputs.env_suffix }}/g")
            SECRETS_FLAG="${SECRETS_FLAG},${ADDITIONAL_SECRETS}"
          fi
          
          # Build env vars
          ENV_VARS="GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }}"
          ENV_VARS="${ENV_VARS},CLOUD_SQL_INSTANCE=${{ vars.CLOUDSQL_CONNECTION }}"
          ENV_VARS="${ENV_VARS},DB_NAME=${{ vars.DB_NAME }}"
          ENV_VARS="${ENV_VARS},DB_USER=${{ inputs.db-user }}"
          ENV_VARS="${ENV_VARS},DB_POOL_SIZE=5"
          if [ -n "${{ vars.USER_SERVICE_URL }}" ]; then
            ENV_VARS="${ENV_VARS},USER_SERVICE_URL=${{ vars.USER_SERVICE_URL }}"
          fi
          if [ -n "${{ vars.CORE_SERVICE_URL }}" ]; then
            ENV_VARS="${ENV_VARS},CORE_SERVICE_URL=${{ vars.CORE_SERVICE_URL }}"
          fi
          if [ -n "${{ inputs.additional-env-vars }}" ]; then
            # Replace {env} placeholder with actual environment suffix
            ADDITIONAL_ENV_VARS=$(echo "${{ inputs.additional-env-vars }}" | sed "s/{env}/${{ steps.env.outputs.env_suffix }}/g")
            ENV_VARS="${ENV_VARS},${ADDITIONAL_ENV_VARS}"
          fi
          
          # Determine min instances (use env var or default)
          MIN_INSTANCES="${{ vars.MIN_INSTANCES }}"
          if [ -z "$MIN_INSTANCES" ]; then
            MIN_INSTANCES="${{ steps.env.outputs.default_min_instances }}"
          fi
          
          echo "==========================================="
          echo "Deploying ${{ inputs.service-name }}"
          echo "==========================================="
          echo "Environment:     ${{ inputs.environment }}"
          echo "Project:         ${{ vars.GCP_PROJECT_ID }}"
          echo "Region:          ${{ vars.GCP_REGION }}"
          echo "Service Account: ${SERVICE_ACCOUNT}"
          echo "Image:           ${{ vars.ARTIFACT_REGISTRY_URL }}/${{ inputs.service-name }}:${{ github.sha }}"
          echo "==========================================="
          
          gcloud run deploy ${{ inputs.service-name }} \
            --image ${{ vars.ARTIFACT_REGISTRY_URL }}/${{ inputs.service-name }}:${{ github.sha }} \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --platform managed \
            --service-account ${SERVICE_ACCOUNT} \
            --vpc-connector ${{ vars.VPC_CONNECTOR }} \
            --vpc-egress private-ranges-only \
            --set-cloudsql-instances ${{ vars.CLOUDSQL_CONNECTION }} \
            --cpu ${{ inputs.cpu }} \
            --memory ${{ inputs.memory }} \
            --min-instances ${MIN_INSTANCES} \
            --max-instances ${{ inputs.max-instances }} \
            --timeout ${{ inputs.timeout }} \
            --concurrency ${{ inputs.concurrency-limit }} \
            --allow-unauthenticated \
            --set-env-vars "${ENV_VARS}" \
            --set-secrets "${SECRETS_FLAG}"

      - name: Verify deployment
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ inputs.service-name }} \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --format='value(status.url)')
          
          REVISION=$(gcloud run services describe ${{ inputs.service-name }} \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --format='value(status.latestReadyRevisionName)')
          
          echo ""
          echo "==========================================="
          echo "Deployment Successful"
          echo "==========================================="
          echo "Service:     ${{ inputs.service-name }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Revision:    ${REVISION}"
          echo "URL:         ${SERVICE_URL}"
          echo "==========================================="
