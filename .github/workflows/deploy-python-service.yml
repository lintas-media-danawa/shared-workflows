name: Deploy Python Service (Reusable)

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: 'Service name (e.g., ai-service)'
      environment:
        required: true
        type: string
        description: 'Target environment (dev or prod)'
      python-version:
        type: string
        default: '3.11'
      memory:
        type: string
        default: '2Gi'
      cpu:
        type: string
        default: '2'
      min-instances:
        type: number
        default: 0
      max-instances:
        type: number
        default: 10
      db-user:
        required: true
        type: string
        description: 'Database username (e.g., ai_service)'
      db-secret-name:
        required: true
        type: string
        description: 'DB password secret base name without env suffix (e.g., db-ai-service-password)'
      additional-env-vars:
        type: string
        default: ''
        description: 'Additional env vars in format: KEY1=value1,KEY2=value2'
      additional-secrets:
        type: string
        default: ''
        description: 'Additional secrets in format: ENV_VAR=secret-name-{env}:version (use {env} as placeholder)'
      run-tests:
        type: boolean
        default: true
      timeout:
        type: string
        default: '300s'
      concurrency-limit:
        type: number
        default: 80
      test-command:
        type: string
        default: 'pytest'
        description: 'Command to run tests (e.g., pytest, pytest -v)'

jobs:
  test:
    name: Run Tests
    if: ${{ inputs.run-tests }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'prod' && 'production' || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        run: ${{ inputs.test-command }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_TEST || 'test-key' }}

  build-and-push:
    name: Build & Push Image
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'prod' && 'production' || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment suffix
        id: env
        run: |
          # Set env_suffix based on environment (used for service account and secret naming)
          if [ "${{ inputs.environment }}" == "prod" ]; then
            echo "env_suffix=prod" >> $GITHUB_OUTPUT
            echo "default_min_instances=1" >> $GITHUB_OUTPUT
          else
            echo "env_suffix=dev" >> $GITHUB_OUTPUT
            echo "default_min_instances=0" >> $GITHUB_OUTPUT
          fi

      - name: Debug - Check secrets and variables availability
        run: |
          echo "Environment: ${{ inputs.environment }}"
          echo "GCP Project: ${{ vars.GCP_PROJECT_ID }}"
          echo "Region: ${{ vars.GCP_REGION }}"
          echo "WIF Provider length: ${#WIF}"
          echo "SA Email length: ${#SA}"
          if [ -z "$WIF" ]; then
            echo "ERROR: WORKLOAD_IDENTITY_PROVIDER is empty!"
          fi
          if [ -z "$SA" ]; then
            echo "ERROR: SERVICE_ACCOUNT_EMAIL is empty!"
          fi
        env:
          WIF: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          SA: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ vars.ARTIFACT_REGISTRY_URL }}/${{ inputs.service-name }}:${{ github.sha }} \
            -t ${{ vars.ARTIFACT_REGISTRY_URL }}/${{ inputs.service-name }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ vars.ARTIFACT_REGISTRY_URL }}/${{ inputs.service-name }}:${{ github.sha }}
          docker push ${{ vars.ARTIFACT_REGISTRY_URL }}/${{ inputs.service-name }}:latest

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          # Service account: {service-name}-{env}@{project}.iam.gserviceaccount.com
          SERVICE_ACCOUNT="${{ inputs.service-name }}-${{ steps.env.outputs.env_suffix }}@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com"
          
          # DB password secret: {db-secret-name}-{env}:latest
          DB_SECRET="${{ inputs.db-secret-name }}-${{ steps.env.outputs.env_suffix }}:latest"
          
          # Build secrets flag
          SECRETS_FLAG="DB_PASSWORD=${DB_SECRET}"
          if [ -n "${{ inputs.additional-secrets }}" ]; then
            # Replace {env} placeholder with actual environment suffix
            ADDITIONAL_SECRETS=$(echo "${{ inputs.additional-secrets }}" | sed "s/{env}/${{ steps.env.outputs.env_suffix }}/g")
            SECRETS_FLAG="${SECRETS_FLAG},${ADDITIONAL_SECRETS}"
          fi
          
          # Build env vars - use ^:^ delimiter to support commas in values
          ENV_VARS="GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }}"
          ENV_VARS="${ENV_VARS}^:^CLOUDSQL_CONNECTION=${{ vars.CLOUDSQL_CONNECTION }}"
          ENV_VARS="${ENV_VARS}^:^DB_NAME=${{ vars.DB_NAME }}"
          ENV_VARS="${ENV_VARS}^:^DB_USER=${{ inputs.db-user }}"
          if [ -n "${{ vars.USER_SERVICE_URL }}" ]; then
            ENV_VARS="${ENV_VARS}^:^USER_SERVICE_URL=${{ vars.USER_SERVICE_URL }}"
          fi
          if [ -n "${{ vars.APPLICATION_SERVICE_URL }}" ]; then
            ENV_VARS="${ENV_VARS}^:^APPLICATION_SERVICE_URL=${{ vars.APPLICATION_SERVICE_URL }}"
          fi
          if [ -n "${{ vars.DOCUMENT_SERVICE_URL }}" ]; then
            ENV_VARS="${ENV_VARS}^:^DOCUMENT_SERVICE_URL=${{ vars.DOCUMENT_SERVICE_URL }}"
          fi
          if [ -n "${{ vars.KEYCLOAK_URL }}" ]; then
            ENV_VARS="${ENV_VARS}^:^KEYCLOAK_URL=${{ vars.KEYCLOAK_URL }}"
          fi
          if [ -n "${{ vars.JOSS_URL }}" ]; then
            ENV_VARS="${ENV_VARS}^:^JOSS_URL=${{ vars.JOSS_URL }}"
          fi
          if [ -n "${{ vars.PUBSUB_SUBSCRIPTION_IDS }}" ]; then
            ENV_VARS="${ENV_VARS}^:^PUBSUB_SUBSCRIPTION_IDS=${{ vars.PUBSUB_SUBSCRIPTION_IDS }}"
          fi
          if [ -n "${{ inputs.additional-env-vars }}" ]; then
            # Replace commas with ^:^ delimiter and remove backslash escapes
            ADDITIONAL_ENV_VARS="${{ inputs.additional-env-vars }}"
            ADDITIONAL_ENV_VARS="${ADDITIONAL_ENV_VARS//\\,/,}"  # Remove backslash escapes
            ADDITIONAL_ENV_VARS="${ADDITIONAL_ENV_VARS//,/^:^}"   # Replace , with ^:^
            ENV_VARS="${ENV_VARS}^:^${ADDITIONAL_ENV_VARS}"
          fi
          
          # Determine min instances (use env var or default)
          MIN_INSTANCES="${{ vars.MIN_INSTANCES }}"
          if [ -z "$MIN_INSTANCES" ]; then
            MIN_INSTANCES="${{ steps.env.outputs.default_min_instances }}"
          fi
          
          echo "==========================================="
          echo "Deploying ${{ inputs.service-name }}"
          echo "==========================================="
          echo "Environment:     ${{ inputs.environment }}"
          echo "Project:         ${{ vars.GCP_PROJECT_ID }}"
          echo "Region:          ${{ vars.GCP_REGION }}"
          echo "Service Account: ${SERVICE_ACCOUNT}"
          echo "Image:           ${{ vars.ARTIFACT_REGISTRY_URL }}/${{ inputs.service-name }}:${{ github.sha }}"
          echo "==========================================="
          
          gcloud run deploy ${{ inputs.service-name }} \
            --image ${{ vars.ARTIFACT_REGISTRY_URL }}/${{ inputs.service-name }}:${{ github.sha }} \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --platform managed \
            --service-account ${SERVICE_ACCOUNT} \
            --vpc-connector ${{ vars.VPC_CONNECTOR }} \
            --vpc-egress private-ranges-only \
            --set-cloudsql-instances ${{ vars.CLOUDSQL_CONNECTION }} \
            --cpu ${{ inputs.cpu }} \
            --memory ${{ inputs.memory }} \
            --min-instances ${MIN_INSTANCES} \
            --max-instances ${{ inputs.max-instances }} \
            --timeout ${{ inputs.timeout }} \
            --concurrency ${{ inputs.concurrency-limit }} \
            --allow-unauthenticated \
            --set-env-vars "${ENV_VARS}" \
            --set-secrets "${SECRETS_FLAG}"

      - name: Verify deployment
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ inputs.service-name }} \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --format='value(status.url)')
          
          REVISION=$(gcloud run services describe ${{ inputs.service-name }} \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --format='value(status.latestReadyRevisionName)')
          
          echo ""
          echo "==========================================="
          echo "Deployment Successful"
          echo "==========================================="
          echo "Service:     ${{ inputs.service-name }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Revision:    ${REVISION}"
          echo "URL:         ${SERVICE_URL}"
          echo "==========================================="
